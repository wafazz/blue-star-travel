<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>You're offline — Blue Star Travel &amp; Tours</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#1466ff 0%,#0b3fd1 60%,#082aa0 100%);color:#fff;
    min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:28px;text-align:center}
  .wrap{max-width:340px}
  .logo{width:150px;background:#fff;border-radius:24px;padding:14px 16px;margin:0 auto 24px;
    box-shadow:0 12px 30px rgba(8,42,160,.3)}
  .logo img{width:100%;display:block}
  h1{font-size:21px;font-weight:800;margin-bottom:10px}
  p{font-size:14px;opacity:.85;line-height:1.6;font-weight:500}
  button{margin-top:26px;width:100%;border:none;border-radius:14px;padding:14px;font-size:15px;
    font-weight:800;background:#fff;color:#0b3fd1;cursor:pointer}
  button:active{transform:scale(.98)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><img src="/images/logo.png" alt="Blue Star Travel &amp; Tours"></div>
    <h1>You're offline</h1>
    <p>We can't reach Blue Star right now. Check your connection — your bookings and commission are safe and will be here when you're back.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
